name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================================================
  # BUILD + TESTES — matrix de versões Java
  # ============================================================
  build:
    name: Build & Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false          # continua as outras versões mesmo se uma falhar
      matrix:
        java-version: [ '21', '17' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Tornar gradlew executável
        run: chmod +x gradlew

      - name: Setup Gradle com cache
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # ── Build ────────────────────────────────────────────────
      - name: Build com Gradle
        run: ./gradlew build -Dfile.encoding=UTF-8 --no-daemon

      # ── Cucumber ─────────────────────────────────────────────
      - name: Rodar testes Cucumber
        run: ./gradlew test -Dfile.encoding=UTF-8 --no-daemon

      # ── JaCoCo ───────────────────────────────────────────────
      - name: Gerar relatório JaCoCo
        if: always()
        run: ./gradlew jacocoTestReport -Dfile.encoding=UTF-8 --no-daemon

      - name: Verificar cobertura minima (80%)
        run: ./gradlew jacocoTestCoverageVerification -Dfile.encoding=UTF-8 --no-daemon

      # ── Artefatos ────────────────────────────────────────────
      - name: Publicar relatórios
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-java${{ matrix.java-version }}
          path: |
            build/reports/tests/test/
            build/reports/jacoco/test/html/
            build/cucumber-reports/
          retention-days: 7

      # ── Notificação ──────────────────────────────────────────
      - name: Notificar falha no PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Build falhou** com Java ${{ matrix.java-version }}\n\nVeja os detalhes em: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

  # ============================================================
  # DEPENDENCY GRAPH (Dependabot Alerts)
  # ============================================================
  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Tornar gradlew executável
        run: chmod +x gradlew

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
