name: Testes e Cobertura

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Permissão ao gradlew
        run: chmod +x gradlew

      - name: Executar testes unitários
        run: ./gradlew test --tests "*Test" --info
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Executar testes de integração
        run: ./gradlew test --tests "*IntegrationTest" --info
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Gerar relatório de cobertura JaCoCo
        run: ./gradlew jacocoTestReport

      - name: Verificar thresholds de cobertura
        run: ./gradlew jacocoTestCoverageVerification

      - name: Publicar relatório de cobertura
        uses: codecov/codecov-action@v4
        with:
          file: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit
          path: build/test-results/test/*.xml
          reporter: java-junit
